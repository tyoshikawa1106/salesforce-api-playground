name: 機能・改善
description: 機能追加、UI、ドキュメント、運用の改善を記録する
labels:
  - enhancement
  - type:improvement
body:
  - type: textarea
    id: memo
    attributes:
      label: メモ
      description: 気になっていること、変えたいこと、相談したいことを自由に書いてください。
      placeholder: |
        例:
        README の入口情報が多く、初見で目的別に探しづらい。
        docs 側へ詳細を寄せて、README は主要な入口に絞りたい。
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 補足
      description: 関連する画面、API、ファイル、docs、運用、今回やらないことなどがあれば書いてください。
    validations:
      required: false
