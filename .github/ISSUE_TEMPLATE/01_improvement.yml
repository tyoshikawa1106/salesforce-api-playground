name: 機能・改善
description: 機能追加、UI、ドキュメント、運用の改善を記録する
title: "[Feature/Improvement] "
labels:
  - enhancement
  - type:improvement
body:
  - type: textarea
    id: summary
    attributes:
      label: 内容
      description: 改善したい内容を書いてください。
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 目的
      description: なぜ必要か、何が良くなるかを書いてください。
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 関連する画面、API、docs、運用、判断材料などがあれば書いてください。
    validations:
      required: false
