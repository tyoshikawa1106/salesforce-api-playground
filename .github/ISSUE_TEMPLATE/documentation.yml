name: ドキュメント改善
description: README や docs の追加・修正を記録する
title: "[Docs] "
labels:
  - documentation
  - area:docs
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 追加・修正したい内容を簡潔に書いてください。
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: 対象
      description: 関連するファイルやページが分かる場合は書いてください。
      placeholder: README.md, docs/...
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 注意点や判断材料があれば書いてください。
    validations:
      required: false
