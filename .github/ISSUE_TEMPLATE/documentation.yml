name: ドキュメント改善
description: README や docs の追加・修正を記録する
title: "[Docs] "
labels:
  - documentation
  - area:docs
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 追加・修正したい内容を簡潔に書いてください。
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: 対象
      description: 関連するファイルやページが分かる場合は書いてください。
      placeholder: README.md, docs/...
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 未確認事項や注意点があれば書いてください。
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: 影響範囲
      description: docs 以外にも関係する領域があれば選んでください。
      options:
        - docs / README
        - GitHub / CI
        - Heroku / デプロイ
        - Salesforce / API
        - UI / SLDS
        - テスト
        - 未確認
    validations:
      required: false
