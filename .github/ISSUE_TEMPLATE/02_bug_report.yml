name: 不具合報告
description: 動作不良や想定外の挙動を記録する
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 問題
      description: 何が起きているかを簡潔に書いてください。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 確認できている範囲で手順を書いてください。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どうなるべきかを書いてください。
    validations:
      required: false
