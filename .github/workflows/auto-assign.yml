name: Auto assign

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

env:
  ASSIGNEE: ${{ github.repository_owner }}

jobs:
  assign-issue:
    name: Assign issue owner
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest

    steps:
      - name: Assign issue
        run: gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-assignee "$ASSIGNEE"
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}

  assign-pull-request:
    name: Assign pull request owner
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest

    steps:
      - name: Assign pull request
        run: gh issue edit "$PR_NUMBER" --repo "$REPOSITORY" --add-assignee "$ASSIGNEE"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
