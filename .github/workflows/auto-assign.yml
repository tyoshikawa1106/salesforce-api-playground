name: Auto assign

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

env:
  PROJECT_OWNER: tyoshikawa1106
  PROJECT_NUMBER: 1

jobs:
  assign-issue:
    name: Assign issue owner
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    env:
      ASSIGNEE: tyoshikawa1106
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Assign issue
        run: gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-assignee "$ASSIGNEE"
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}

  assign-pull-request:
    name: Assign pull request owner
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    env:
      ASSIGNEE: tyoshikawa1106
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Assign pull request
        run: gh issue edit "$PR_NUMBER" --repo "$REPOSITORY" --add-assignee "$ASSIGNEE"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}

  add-issue-to-project:
    name: Add issue to project
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}

    steps:
      - name: Add issue to project
        if: env.GH_TOKEN != ''
        run: gh project item-add "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --url "$ISSUE_URL"
        env:
          ISSUE_URL: ${{ github.event.issue.html_url }}

      - name: Skip project assignment
        if: env.GH_TOKEN == ''
        run: echo "Skipping Project assignment because GH_PROJECT_TOKEN is not configured."

  add-pull-request-to-project:
    name: Add pull request to project
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}

    steps:
      - name: Add pull request to project
        if: env.GH_TOKEN != ''
        run: gh project item-add "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --url "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Skip project assignment
        if: env.GH_TOKEN == ''
        run: echo "Skipping Project assignment because GH_PROJECT_TOKEN is not configured."
