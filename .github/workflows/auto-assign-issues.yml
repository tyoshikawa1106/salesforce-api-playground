name: Auto assign issues

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  assign:
    name: Assign issue owner
    runs-on: ubuntu-latest

    env:
      ISSUE_ASSIGNEE: tyoshikawa1106
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Assign issue
        run: gh issue edit "$ISSUE_NUMBER" --repo "$REPOSITORY" --add-assignee "$ISSUE_ASSIGNEE"
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
