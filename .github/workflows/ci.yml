name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect change scope
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PR_BASE_SHA"
            head_sha="$PR_HEAD_SHA"
            git diff --name-only "$base_sha" "$head_sha" > changed-files.txt
          else
            base_sha="$BEFORE_SHA"
            head_sha="$HEAD_SHA"
            if [[ "$base_sha" =~ ^0+$ ]]; then
              git diff-tree --no-commit-id --name-only -r "$head_sha" > changed-files.txt
            else
              git diff --name-only "$base_sha" "$head_sha" > changed-files.txt
            fi
          fi

          docs_only=true
          if [[ ! -s changed-files.txt ]]; then
            docs_only=false
          fi

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              *.md|docs/*|.github/pull_request_template.md) ;;
              *) docs_only=false ;;
            esac
          done < changed-files.txt

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          sed 's/^/- /' changed-files.txt

      - name: Check docs-only diff
        if: steps.changes.outputs.docs_only == 'true'
        run: git diff --check "${{ steps.changes.outputs.base_sha }}" "${{ steps.changes.outputs.head_sha }}"

      - name: Set up Node.js
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Run lint
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run lint

      - name: Run SLDS lint
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run slds:lint

      - name: Run typecheck
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run typecheck

      - name: Run unit tests with coverage
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run test:coverage

      - name: Add coverage summary
        if: always() && steps.changes.outputs.docs_only != 'true' && hashFiles('coverage/coverage-summary.json') != ''
        run: node .github/scripts/write-coverage-summary.mjs

      - name: Build application
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run build
