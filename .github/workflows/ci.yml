name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, and build / Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run SLDS lint
        run: npm run slds:lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Add coverage summary
        if: always() && hashFiles('coverage/coverage-summary.json') != ''
        run: node .github/scripts/write-coverage-summary.mjs

      - name: Build application
        run: npm run build
