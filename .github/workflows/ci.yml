name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check workflow YAML syntax
        run: npm run workflows:check

      - name: Detect change scope
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          changed_files="$RUNNER_TEMP/changed-files.txt"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PR_BASE_SHA"
            head_sha="$PR_HEAD_SHA"
            git diff --name-only "$base_sha" "$head_sha" > "$changed_files"
          else
            base_sha="$BEFORE_SHA"
            head_sha="$HEAD_SHA"
            if [[ "$base_sha" =~ ^0+$ ]]; then
              git diff-tree --no-commit-id --name-only -r "$head_sha" > "$changed_files"
            else
              git diff --name-only "$base_sha" "$head_sha" > "$changed_files"
            fi
          fi

          # Keep docs-only PRs light. Markdown, docs, and GitHub templates run
          # whitespace diff checks plus the sensitive-value scan, but skip the
          # Node.js full check.
          docs_only=true
          ui_related=false
          if [[ ! -s "$changed_files" ]]; then
            docs_only=false
          fi

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              *.md|docs/*|.github/pull_request_template.md|.github/ISSUE_TEMPLATE/*) ;;
              *) docs_only=false ;;
            esac

            case "$file" in
              app/*.tsx|app/**/*.tsx|components/*|components/**/*|*.css|**/*.css) ui_related=true ;;
              slds-linter.eslint.config.mjs|eslint.config.mjs|next.config.mjs) ui_related=true ;;
              package.json|package-lock.json|npm-shrinkwrap.json) ui_related=true ;;
              .github/workflows/*) ui_related=true ;;
            esac
          done < "$changed_files"

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "ui_related=$ui_related" >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          sed 's/^/- /' "$changed_files"
          echo "docs_only=$docs_only"
          echo "ui_related=$ui_related"
          if [[ "$docs_only" == "true" ]]; then
            echo "CI scope: docs/template-only change. Running git diff --check and sensitive-value scan."
          else
            echo "CI scope: code or configuration change. Running Node.js full check."
          fi
          if [[ "$ui_related" == "true" ]]; then
            echo "SLDS lint scope: UI, CSS, SLDS config, package, or CI workflow change detected."
          else
            echo "SLDS lint scope: no UI, CSS, SLDS config, package, or CI workflow change detected."
          fi

      - name: Check docs-only diff
        if: steps.changes.outputs.docs_only == 'true'
        run: git diff --check "${{ steps.changes.outputs.base_sha }}" "${{ steps.changes.outputs.head_sha }}"

      - name: Scan for sensitive values
        run: node .github/scripts/scan-sensitive-values.mjs

      - name: Set up Node.js
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Run lint
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run lint

      - name: Run SLDS lint
        if: steps.changes.outputs.docs_only != 'true' && steps.changes.outputs.ui_related == 'true'
        run: npm run slds:lint

      - name: Skip SLDS lint
        if: steps.changes.outputs.docs_only != 'true' && steps.changes.outputs.ui_related != 'true'
        run: |
          echo "Normal skip: SLDS lint is not required because changed files are not UI, CSS, SLDS config, package, or CI workflow related."

      - name: Run typecheck
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run typecheck

      - name: Run unit tests with coverage threshold
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run test:coverage

      - name: Add coverage summary
        if: always() && steps.changes.outputs.docs_only != 'true' && hashFiles('coverage/coverage-summary.json') != ''
        run: node .github/scripts/write-coverage-summary.mjs

      - name: Build application
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run build
